<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonyGist - Manager</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b6b3a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',Arial,sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.auth-bar {
  background: #0b6b3a;
  color: white;
  padding: 10px 20px;
  text-align: center;
  margin: -20px -20px 20px -20px;
  border-radius: 0;
}
.auth-bar button {
  background: white;
  color: #0b6b3a;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  margin-left: 10px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0b6b3a;
margin-bottom:10px;
font-weight:700;
}

#app-section {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN BAR -->
<div class="auth-bar" id="login-section">
  <span>Login to access manager</span>
  <button id="google-login">Login with Google</button>
</div>

<div class="auth-bar" id="app-section">
  <span>Welcome <span id="user-email"></span></span>
  <button id="logout">Logout</button>
</div>

<div class="container" id="app-section">
  <h1>📊 MonyGist Manager</h1>
  <p>Your saved calculations will show here.</p>
  
  <!-- Add your manager content here -->
  
</div>

<script type="module" src="script.js?v=999"></script>
</body>
</html>
